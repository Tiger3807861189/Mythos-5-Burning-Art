schema_version: 1
default: SUBSTANTIVE
classes:
  SUBSTANTIVE:
    action: REQUIRE_FULL_LIFECYCLE
    includes:
      - any requested project, configuration, test, dependency, or generated-content change
      - diagnosis, reproduction, debugging, or repair work that requires experiments
      - consequential architecture, interface, data, security, privacy, UX, cost, or scope decisions
      - any request that could lead to a later mutation
  READ_ONLY_EXEMPTION:
    action: RECORD_EXEMPTION
    grammar:
      - one explicit explain, summarize, review, inspect, read, audit, analyze, check, answer, what-is, what-are, or how-does request
      - only conservative repository nouns and no mutation clause
    examples:
      - Explain what this repository is.
      - Review the current plan.
      - Report status.
    excluded_examples:
      - Summarize the repository by purging its cache.
      - Report status by messaging Slack.
      - Answer the question by notifying the team.
      - Explain the file by obliterating it.
rules:
  - If classification is uncertain, use SUBSTANTIVE.
  - A small change is still SUBSTANTIVE.
  - Non-mutating debug completes the full lifecycle with empty content delta and durable diagnostic attempts.