schema_version: 1
suite: mythos-5-burning-art
phase_statuses: [PENDING, ACTIVE, PASS, BLOCKED, NOT_APPLICABLE]
terminal_statuses: [AWAITING_HUMAN_INPUT, AWAITING_HUMAN_PLAN_APPROVAL, NEEDS_HUMAN_JUDGMENT, BLOCKED, VERIFICATION_FAILED, DONE]
phases:
  - {id: INTAKE, order: 1, pass_requires: [goal, boundaries, constraints, authorization, task_profile]}
  - {id: TERRITORY_DISCOVERY, order: 2, pass_requires: [repository_map, governing_instructions, conventions, baseline]}
  - {id: UNKNOWNS_AND_BLINDSPOTS, order: 3, pass_requires: [known_knowns, known_unknowns, unknown_knowns, unknown_unknowns, blindspot_pass]}
  - {id: OPTIONS_REFERENCES_OR_PROTOTYPES, order: 4, pass_requires: [option_disposition], not_applicable_requires: [permitted_code, exact_evidence_keys]}
  - {id: ACCEPTANCE_CRITERIA, order: 5, pass_requires: [observable_acceptance_criteria]}
  - {id: IMPLEMENTATION_PLAN, order: 6, pass_requires: [exact_plan_steps, mutation_scope, verification_plan]}
  - {id: INDEPENDENT_PLAN_CRITIQUE, order: 7, pass_requires: [sealed_review_hash, host_verified_fresh_isolation, exact_twelve_section_receipt]}
  - {id: AWAITING_HUMAN_PLAN_APPROVAL, order: 8, pass_requires: [hook_owned_human_approval_receipt]}
  - {id: IMPLEMENTATION_LOOP, order: 9, pass_requires: [durable_attempt_per_substantive_act, passing_attempt_per_step, no_pending_act, implementation_notes, increment_evidence]}
  - {id: INDEPENDENT_VERIFICATION, order: 10, pass_requires: [sealed_verification_hash, exact_content_delta, host_verified_fresh_isolation, complete_criterion_receipt]}
  - {id: PLAN_VS_ACTUAL_RECONCILIATION, order: 11, pass_requires: [every_plan_step_subject, every_changed_path_subject, hook_owned_scope_and_fingerprint]}
  - {id: EXPLANATION_AND_COMPREHENSION_CHECK, order: 12, pass_requires: [change_explanation, risks, rollback, comprehension_evidence]}
  - {id: DONE, order: 13, pass_requires: [done_guard_receipt, consumed_approval]}
profiles:
  build: {required: true, mutation_default: true}
  debug: {required: true, mutation_default: false, exact_diagnostic_commands_allowed: true}
  repair: {required: true, mutation_default: true}
  plan_only: {required: true, mutation_allowed: false}
reentry:
  every_reapproval_from: UNKNOWNS_AND_BLINDSPOTS
  verifier_non_pass_terminal: VERIFICATION_FAILED
  verifier_non_pass_from: UNKNOWNS_AND_BLINDSPOTS
  same_approval_repair_after_sealing: false
invariants:
  - Every phase appears in the ledger.
  - Silence never means NOT_APPLICABLE.
  - Mutation requires current exact human approval.
  - A material or unrecorded content change invalidates approval.
  - Each hook-authorized substantive tool invocation opens one durable pending act and exactly one attempt packet closes it before another substantive invocation, replanning packet, waiting or terminal transition, or verification packet.
  - The third consecutive no-gain failure forces a human wait or terminal packet.
  - Critic and verifier PASS require host-observed no-inherited-turn isolation.
  - DONE requires hook-derived content evidence and consumes approval.