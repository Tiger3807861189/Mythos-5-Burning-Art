schema_version: 1
pre_approval_default: DENY
observable_supported_mutations:
  - regular-file create, edit, delete, rename, or move through recognized filesystem write tools
  - exact approved project-root shell commands whose regular-file content results are captured
scope_rules:
  - Paths are portable and project-relative.
  - A trailing slash or backslash denotes a recursive directory scope.
  - Every path without a trailing separator is an exact target.
  - Absolute paths, upward traversal, device namespaces, alternate streams, reserved Windows names, reparse traversal, and hardlinked mutation targets are denied.
  - External effects must be an empty array.
unsupported_mutations:
  - external-system writes, deployment, service changes, database writes, and remote publication
  - Git index, commit, branch, tag, stash, checkout, reset, or push changes
  - permission-only, owner-only, timestamp-only, or empty-directory changes
  - symlink, hardlink, junction, or other reparse-point creation
  - dependency installation and migration execution when their complete effects are not regular-file content inside approved scope
pre_approval_allow:
  - native read tools
  - narrowly allowlisted Git metadata reads or pwd from the exact governed project root
  - hook-owned authority and state writes outside the project
pre_approval_prototypes: unavailable
prototype_policy:
  - Use non-mutating references and comparison artifacts.
  - If executable prototyping is necessary, record no_safe_executable_prototype and ask the human for a separately governed environment.
content_observation:
  - Approval captures a byte snapshot and scoped manifest.
  - Verification receives exact UTF-8 or base64 before-and-after content for changed regular files.
  - Common generated roots are excluded from the bounded global scan unless an approved path targets them or the approval contains any exact command; command-bearing scopes monitor every generated root because commands can mutate them indirectly.
  - Each hook-authorized substantive tool invocation atomically opens one durable pending act with its unique act ID, exact tool-input hash, and before-act scoped fingerprint.
  - Exactly one attempt packet must close that act before another substantive invocation, replanning packet, waiting or terminal transition, or verification packet; the after-act fingerprint advances the expected boundary and unrecorded changes invalidate approval.
limitations:
  - Hooks enforce only host events and tool paths they actually observe.
  - Disabled, untrusted, skipped, or failed hooks provide no deterministic boundary.
  - Host permissions, sandboxes, and authorization remain authoritative.