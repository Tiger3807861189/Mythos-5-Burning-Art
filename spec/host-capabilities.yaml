fresh_context_contract: PreToolUse must bind one exact neutral dedicated-reviewer launch to the active sealed packet; Codex additionally requires observable fork_turns none, Claude requires a named custom agent rather than fork, and SubagentStop must supply the matching new ID plus a distinct nested subagent transcript.
native_permission_contract: A substantive PreToolUse opens one act; a following PermissionRequest must match its tool name, exact input hash, and host tool-use ID, never opens another act, and returns neutral control to native policy.
release_rule: A surface remains experimental until a live loading and behavior test passes.
